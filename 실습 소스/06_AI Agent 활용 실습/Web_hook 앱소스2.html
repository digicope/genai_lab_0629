<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>n8n AI Assistant</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            padding: 20px;
        }

        /* 메인 챗 컨테이너 */
        .chat-app {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 700px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        /* 헤더 영역 (주황/코랄) */
        .chat-header {
            background-color: #ff6550;
            padding: 18px;
            text-align: center;
            color: #ffffff;
        }

        .chat-header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        /* 채팅 메시지 스크롤 영역 */
        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #ffffff;
        }

        /* 말풍선 공통 스타일 */
        .message-row {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message-bubble {
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
            border-radius: 16px;
        }

        /* 사용자 메시지 (우측 주황색 말풍선) */
        .message-row.user {
            align-self: flex-end;
        }

        .message-row.user .message-bubble {
            background-color: #ff6550;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        /* AI Agent 메시지 (좌측 연회색 말풍선) */
        .message-row.bot {
            align-self: flex-start;
        }

        .message-row.bot .message-bubble {
            background-color: #e9ecef;
            color: #212529;
            border-bottom-left-radius: 4px;
            font-family: inherit;
        }

        /* JSON 응답용 스타일 */
        .message-row.bot .message-bubble.code-format {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            white-space: pre-wrap;
        }

        /* 하단 입력 영역 */
        .chat-footer {
            background-color: #ffffff;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #f1f3f5;
        }

        .chat-footer input {
            flex: 1;
            border: 1px solid #ced4da;
            background-color: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            color: #333333;
        }

        .chat-footer input::placeholder {
            color: #adb5bd;
        }

        .chat-footer input:focus {
            border-color: #ff6550;
        }

        .chat-footer button {
            background-color: #ff6550;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
            transition: background-color 0.2s;
        }

        .chat-footer button:hover {
            background-color: #e55542;
        }

        .chat-footer button:disabled {
            background-color: #ffb5ab;
            cursor: not-allowed;
        }

        /* 모바일 풀스크린 대응 */
        @media (max-width: 500px) {
            body {
                padding: 0;
            }
            .chat-app {
                max-width: 100%;
                height: 100%;
                max-height: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

<div class="chat-app">
    <!-- 헤더 -->
    <div class="chat-header">
        <h1>n8n AI Assistant</h1>
    </div>

    <!-- 채팅 기록 출력창 -->
    <div class="chat-body" id="chatBody">
        <!-- 기본 안내 메시지 -->
        <div class="message-row bot">
            <div class="message-bubble">안녕하세요! 무엇이든 물어보세요.</div>
        </div>
    </div>

    <!-- 하단 입력창 -->
    <div class="chat-footer">
        <input 
            type="text" 
            id="userMessage" 
            placeholder="질문을 입력하세요..." 
            value="연봉 6,000만 원을 12로 나누면 월급이 얼마야?"
            onkeypress="if(event.key === 'Enter') sendRequest()"
        >
        <button id="sendBtn" onclick="sendRequest()">전송</button>
    </div>
</div>

<script>
async function sendRequest() {
    const inputElement = document.getElementById('userMessage');
    const chatBody = document.getElementById('chatBody');
    const sendBtn = document.getElementById('sendBtn');
    
    const message = inputElement.value.trim();
    if (!message) return;

    const webhookUrl = "https://digicope.app.n8n.cloud/webhook/agent-assistant";

    // 1. 사용자 질문 메시지 추가 (우측 주황색)
    appendMessage('user', message);
    inputElement.value = '';
    
    // 2. AI 로딩 메시지 추가 (좌측 회색)
    const loadingBubble = appendMessage('bot', '답변을 생성하고 있습니다...');
    
    sendBtn.disabled = true;
    scrollToBottom();

    try {
        const response = await fetch(webhookUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: message })
        });

        if (!response.ok) {
            throw new Error(`서버 응답 오류: ${response.status}`);
        }

        const data = await response.json();
        
        // JSON 형태인 경우 이쁘게 정렬하여 표시
        if (typeof data === 'object') {
            loadingBubble.innerText = JSON.stringify(data, null, 2);
            loadingBubble.classList.add('code-format');
        } else {
            loadingBubble.innerText = data;
        }

    } catch (error) {
        loadingBubble.innerText = `⚠️ 오류가 발생했습니다: ${error.message}`;
    } finally {
        sendBtn.disabled = false;
        scrollToBottom();
    }
}

// 채팅 말풍선 추가 함수
function appendMessage(sender, text) {
    const chatBody = document.getElementById('chatBody');
    const rowDiv = document.createElement('div');
    rowDiv.className = `message-row ${sender}`;

    const bubbleDiv = document.createElement('div');
    bubbleDiv.className = 'message-bubble';
    bubbleDiv.innerText = text;

    rowDiv.appendChild(bubbleDiv);
    chatBody.appendChild(rowDiv);
    
    scrollToBottom();
    return bubbleDiv;
}

// 스크롤 하단 이동 함수
function scrollToBottom() {
    const chatBody = document.getElementById('chatBody');
    chatBody.scrollTop = chatBody.scrollHeight;
}
</script>

</body>
</html>
